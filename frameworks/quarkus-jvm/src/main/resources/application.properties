quarkus.http.port=8080
quarkus.log.level=WARN
quarkus.banner.enabled=false

# TLS + HTTP/2 on port 8443 (only when certs are present)
quarkus.http.ssl-port=8443
quarkus.http.ssl.certificate.files=/certs/server.crt
quarkus.http.ssl.certificate.key-files=/certs/server.key
quarkus.http.insecure-requests=enabled
quarkus.http.ssl.client-auth=none

# Allow 25MB request bodies for upload test
quarkus.http.limits.max-body-size=25M

# TechEmpower-style tuning
quarkus.http.accept-backlog=-1
quarkus.http.idle-timeout=0
quarkus.vertx.prefer-native-transport=true
quarkus.http.enable-compression=true
quarkus.http.compression-level=1
